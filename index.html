<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{
        font-family: "Inter", sans-serif;
    }
</style>
</head>
<body class="bg-gray-100">
        <header class="w-[90%] md:w-[80%] mx-auto mt-10">
        <h1 class="text-4xl font-bold text-black-600 mb-8">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg border-b-4 border-white">
                <p class="text-gray-600 font-medium">Total</p>
                <p id="totalCount" class="text-3xl font-bold text-black-700">8</p>
            </div>
            <div class="bg-white p-6 rounded-lg border-b-4 border-white">
                <p class="text-gray-600 font-medium">Interviews</p>
                <p id="interviewCount" class="text-3xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg border-b-4 border-white">
                <p class="text-gray-600 font-medium">Rejected</p>
                <p id="rejectedCount" class="text-3xl font-bold text-red-700">0</p>
            </div>
        </div>
    </header>
     <main class="w-[90%] md:w-[80%] mx-auto mt-12 mb-20">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Available Jobs</h2>
            <span id="currentViewCount" class="bg-blue-600 text-white px-4 py-1 rounded-full">0</span>
        </div>

        <div class="mb-8 flex gap-2">
            <button onclick="toggleTab('all-tab')" id="all-tab" class="bg-blue-800 text-white px-6 py-2 rounded shadow">All</button>
            <button onclick="toggleTab('interview-tab')" id="interview-tab" class="bg-gray-200 text-black px-6 py-2 rounded">Interview</button>
            <button onclick="toggleTab('rejected-tab')" id="rejected-tab" class="bg-gray-200 text-black px-6 py-2 rounded">Rejected</button>
        </div>
     </main>
     
        <div id="job-container" class="grid grid-cols-1 gap-6">
            </div>

        <div id="empty-state" class="hidden text-center py-20">
          <span class="text-blue-500 text-7xl"> <i class="fa-solid fa-file-lines"></i></span>
            <h3 class="text-xl font-semibold text-gray-600">No Jobs Available</h3>
            <p class="text-gray-400">Come back soon for new job opportunities.</p>
        </div>

    <script src="script/script.js"></script>
</body>
</html>
