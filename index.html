<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{
        font-family: "Inter", sans-serif;
    }
</style>
</head>
<body class="bg-gray-100">
        <header class="w-[90%] md:w-[80%] mx-auto mt-10">
        <h1 class="text-4xl font-bold text-black-600 mb-8">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg border-b-4 border-white">
                <p class="text-gray-600 font-medium">Total</p>
                <p id="totalCount" class="text-3xl font-bold text-black-700">8</p>
            </div>
            <div class="bg-white p-6 rounded-lg border-b-4 border-white">
                <p class="text-gray-600 font-medium">Interviews</p>
                <p id="interviewCount" class="text-3xl font-bold text-green-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg border-b-4 border-white">
                <p class="text-gray-600 font-medium">Rejected</p>
                <p id="rejectedCount" class="text-3xl font-bold text-red-700">0</p>
            </div>
        </div>
    </header>
     
    <script src="script/script.js"></script>
</body>
</html>
